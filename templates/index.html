<body class="bg-light">

<div class="container mt-5">
    <!-- <p class="text-muted">
Predict the likelihood of a patient missing a healthcare appointment using Machine Learning.
</p> -->
    <div class="text-center mb-4">
        <h1 class="fw-bold">🏥 Healthcare Appointment Predictor</h1>

        <a href="/view_predictions" class="btn btn-dark mt-3">
            View Prediction History
        </a>
    </div>

    <div class="card shadow p-4 mx-auto" style="max-width:700px;">
        <form method="POST">

        <div class="mb-3">
            <label class="form-label">Age</label>
        <input type="number" name="age" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-control">
                <option value="0">Female</option>
                <option value="1">Male</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Scholarship</label>
            <select name="scholarship" class="form-control">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Hypertension</label>
            <select name="hypertension" class="form-control">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Diabetes</label>
            <select name="diabetes" class="form-control">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Alcoholism</label>
            <select name="alcoholism" class="form-control">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">SMS Received</label>
            <select name="sms" class="form-control">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div  >

        <button type="submit" class="btn btn-primary btn-lg w-100">
            Predict Appointment
        </button>

    </form>
        <!-- Your Form Here -->
    {% if prediction %}

        <div class="alert
            {% if prediction == 'Likely No-Show' %}
            alert-danger
            {% else %}
            alert-success
            {% endif %}
            mt-4">

    <h4>{{ prediction }}</h4>

    <strong>
        No-Show Probability:
        {{ probability }}%
    </strong>

    </div>

    {% endif %}

    </div>

</div>

</body>
</html>
